spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/votacao
    username: votacao
    password: votacao
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jackson:
    deserialization:
      fail-on-unknown-properties: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect    #MySQL8Dialect
        format_sql: true

external-services:
  cpf-validator:
    base-url: https://user-info.herokuapp.com
    path-url: /users
    timeout: 2s
    enabled: true
    use-mock-on-failure: true
