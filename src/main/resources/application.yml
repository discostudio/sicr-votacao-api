spring:
  datasource:
    # Use 'localhost' se rodar a app na IDE, ou 'mysql-db' se rodar no Docker
    url: jdbc:mysql://localhost:3306/votacao_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: uservotacao
    password: passvotacao123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    deserialization:
      fail-on-unknown-properties: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

external-services:
  cpf-validator:
    base-url: https://user-info.herokuapp.com
    path-url: /users
    timeout: 2s
    enabled: true
    use-mock-on-failure: true
